<h1 class="mt-10 text-4xl font-bold tracking-tight text-white sm:text-5xl">Smart Parsing. Human Hiring</h1>
<p class="mt-6 text-lg leading-8 text-gray-300">
Our AI strips away the noise and decodes the DNA of every resume—delivering the high-signal insights you need to build your dream team instantly.</p>
<div class="mt-10 flex items-center gap-x-6">
<form id="uploadForm" action="/process" method="post" enctype="multipart/form-data">

<div class="mt-10 flex flex-col items-start gap-4">

<div id="dropArea"
class="glass cursor-pointer p-6 rounded-2xl border border-dashed border-blue-400 w-full max-w-md text-center transition hover:border-blue-300 hover:bg-blue-500/10">

<i class="fa-solid fa-cloud-arrow-up text-3xl text-blue-400 mb-2"></i>

<p class="text-sm text-gray-300">
Drag & drop your resume here
</p>

<p class="text-xs text-gray-500">
or click to upload PDF
</p>

<input type="file"
name="pdf_doc"
id="pdf_doc"
accept=".pdf"
class="hidden">

</div>

<p id="fileName" class="text-sm text-blue-400"></p>

<button type="submit"
class="bg-blue-500 px-8 rounded-2xl py-2.5 text-sm font-semibold text-white shadow-lg hover:bg-blue-400 transition">
Parse Resume
</button>
<div id="dictionaryValues"
class="mt-6 w-full max-w-md min-h-[200px] p-6 text-white bg-gray-800/80 backdrop-blur rounded-xl border border-gray-700">
</div>

</div>

</form>
                </div>
            </div>
            <div class="mx-auto mt-16 flex max-w-2xl sm:mt-24 lg:ml-10 lg:mr-0 lg:mt-40 lg:max-w-none lg:flex-none xl:ml-32">
                <div class="max-w-3xl flex-none sm:max-w-5xl lg:max-w-none">

                        alt="App screenshot" width="2432" height="1442"

                </div>
            </div>
        </div>

                     <div id="dictionaryValues"
class="w-full max-w-5xl min-h-[300px] p-8 text-white bg-gray-800 rounded-xl mt-10">

        {% if data %}
<script>

const parsedData = JSON.parse('{{ data | tojson | safe }}');

function displayDictionaryValues(data) {
    const container = document.getElementById("dictionaryValues");
    let html = "";

    for (let key in data) {

        html += `
        <div style="
            background:#1f2937;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
        ">
            <h3 style="font-size:18px;font-weight:bold;margin-bottom:8px">
                ${key}
            </h3>
        `;

        if (Array.isArray(data[key])) {
            html += "<ul>";

            data[key].forEach(item => {
                html += `<li>${item}</li>`;
            });

            html += "</ul>";
        } 
        else {
            html += `<p>${data[key]}</p>`;
        }

        html += "</div>";
    }

    container.innerHTML = html;
}

displayDictionaryValues(parsedData);

</script>
{% endif %}
                </div>
            </div>
        </div>
    </div>

  <script>

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("pdf_doc");
const fileName = document.getElementById("fileName");

// open file picker when clicking area
dropArea.addEventListener("click", () => {
    fileInput.click();
});

// show file name when selected
fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileName.textContent = "Selected file: " + fileInput.files[0].name;
    }
});

// prevent browser from opening file
["dragenter","dragover","dragleave","drop"].forEach(eventName => {
    dropArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
    });
});

// highlight drop area
["dragenter","dragover"].forEach(eventName => {
    dropArea.addEventListener(eventName, () => {
        dropArea.classList.add("border-blue-300");
    });
});

// remove highlight
["dragleave","drop"].forEach(eventName => {
    dropArea.addEventListener(eventName, () => {
        dropArea.classList.remove("border-blue-300");
    });
});

// handle dropped file
dropArea.addEventListener("drop", (e) => {

    const files = e.dataTransfer.files;

    if (files.length > 0) {

        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(files[0]);

        fileInput.files = dataTransfer.files;

        fileName.textContent = "Selected file: " + files[0].name;

    }

});

</script>  
</body>
</html>
