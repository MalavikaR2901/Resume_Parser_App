<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Resume Parser</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background: linear-gradient(135deg,#667eea,#764ba2);
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="backdrop-blur-lg bg-white/20 border border-white/30 
p-8 rounded-2xl shadow-2xl w-96">

<h2 class="text-2xl font-bold text-white text-center mb-6">
Create Account
</h2>

<form action="/register" method="POST" class="space-y-4">

<input
type="text"
name="name"
placeholder="Full Name"
required
class="w-full p-3 rounded-lg bg-white/30 text-white placeholder-white border border-white/40 focus:outline-none"
/>

<input
type="email"
name="email"
placeholder="Email"
required
class="w-full p-3 rounded-lg bg-white/30 text-white placeholder-white border border-white/40 focus:outline-none"
/>

<input
type="password"
name="password"
placeholder="Password"
required
class="w-full p-3 rounded-lg bg-white/30 text-white placeholder-white border border-white/40 focus:outline-none"
/>

<button
type="submit"
class="w-full bg-white text-purple-700 font-semibold py-2 rounded-lg hover:bg-gray-200">
Register
</button>

</form>

<p class="text-center text-white mt-4 text-sm">
Already have an account?
<a href="/login" class="font-semibold underline">
Login
</a>
</p>

</div>

</body>
</html>
